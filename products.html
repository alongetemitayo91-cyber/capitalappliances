<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Capital Appliances</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap");
    </style>
  </head>
  <body class="font-sans bg-gray-50">
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
          <div class="flex items-center gap-x-3">
            <img
              src="images/logo.jpg"
              alt="Logo"
              class="h-12 object-contain"
              onerror="
                this.src =
                  'https://via.placeholder.com/200x50/0ea5e9/ffffff?text=CAPITAL'
              "
            />
            <h1
              class="text-3xl font-semibold tracking-tighter"
              style="font-family: &quot;Space Grotesk&quot;, sans-serif"
            >
              Capital <span class="text-sky-600">Appliances</span>
            </h1>
          </div>
          <div class="hidden md:flex gap-x-10 text-lg font-medium">
            <a href="index.html">Home</a>
            <a href="products.html" class="text-sky-600 font-semibold"
              >Products</a
            >
            <button
              onclick="openWhatsApp()"
              class="bg-emerald-500 text-white px-6 py-3 rounded-3xl flex items-center gap-2"
            >
              <i class="fa-brands fa-whatsapp"></i> Contact
            </button>
          </div>
          <button
            onclick="alert('Mobile menu - use top links for now')"
            class="md:hidden text-3xl"
          >
            ☰
          </button>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-16">
      <h1 class="text-5xl font-semibold text-center mb-2">
        Our Premium Products
      </h1>
      <p class="text-center text-gray-600 mb-12">
        Browse our range of home, office and commercial appliances
      </p>

      <div
        id="products-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      >
        <!-- Products will appear here -->
      </div>
    </div>

    <!-- Floating WhatsApp -->
    <button
      onclick="openWhatsApp()"
      class="fixed bottom-8 right-8 bg-[#25D366] text-white w-16 h-16 rounded-3xl shadow-2xl flex items-center justify-center text-4xl z-50"
    >
      <i class="fa-brands fa-whatsapp"></i>
    </button>

    <script>
      const products = [
        {
          name: "Premium Kitchen Extractor",
          category: "Kitchen",
          price: "₦450,000",
          img: "images/extractor.jpg",
        },
        {
          name: "Built-in Electric Oven",
          category: "Kitchen",
          price: "₦680,000",
          img: "images/oven.jpg",
        },
        {
          name: "Heavy Duty Gas Cooker",
          category: "Commercial",
          price: "₦520,000",
          img: "images/cooker.jpg",
        },
        {
          name: "Stainless Steel Cooker",
          category: "Kitchen",
          price: "₦580,000",
          img: "images/cooker2.jpg",
        },
        {
          name: "Industrial Gas Cooker",
          category: "Commercial",
          price: "₦750,000",
          img: "images/cooker3.jpg",
        },
        {
          name: "Microwave Oven",
          category: "Home",
          price: "₦320,000",
          img: "images/microwave.jpg",
        },
        {
          name: "Premium Extractor Hood",
          category: "Kitchen",
          price: "₦520,000",
          img: "images/extractor-premium.jpg",
        },
        {
          name: "High-End Extractor",
          category: "Kitchen",
          price: "₦580,000",
          img: "images/extractorpremium2.jpg",
        },
        {
          name: "Wall Mounted Extractor",
          category: "Kitchen",
          price: "₦480,000",
          img: "images/extractor2.jpg",
        },
        {
          name: "Powerful Extractor",
          category: "Kitchen",
          price: "₦495,000",
          img: "images/extractor3.jpg",
        },
        {
          name: "Modern Appliance",
          category: "Home",
          price: "₦890,000",
          img: "images/something1.jpg",
        },
        {
          name: "Premium Appliance Set",
          category: "Home",
          price: "₦670,000",
          img: "images/something2.jpg",
        },
      ];

      function renderProducts() {
        const grid = document.getElementById("products-grid");
        grid.innerHTML = "";

        products.forEach((p) => {
          const card = `
                <div class="bg-white rounded-3xl overflow-hidden shadow hover:shadow-2xl">
                    <img src="${p.img}" alt="${p.name}" class="w-full h-64 object-cover" 
                         onerror="this.src='https://via.placeholder.com/600x400/cccccc/666666?text=No+Image+Found'">
                    <div class="p-6">
                        <span class="uppercase text-xs text-sky-600 font-medium">${p.category}</span>
                        <h3 class="text-xl font-semibold mt-2">${p.name}</h3>
                        <p class="text-3xl font-bold text-gray-900 mt-4">${p.price}</p>
                        <button onclick="enquire('${p.name}')" 
                                class="mt-8 w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-medium">
                            💬 Enquire on WhatsApp
                        </button>
                    </div>
                </div>`;
          grid.innerHTML += card;
        });
      }

      function enquire(name) {
        const phone = "2348091145666"; // ← CHANGE TO YOUR REAL NUMBER
        const text = encodeURIComponent(`Hello, I'm interested in: ${name}`);
        window.open(`https://wa.me/\( {phone}?text= \){text}`, "_blank");
      }

      function openWhatsApp() {
        const phone = "2348091145666"; // ← CHANGE TO YOUR REAL NUMBER
        window.open(`https://wa.me/${phone}`, "_blank");
      }

      // Load the products
      window.onload = renderProducts;
    </script>
  </body>
</html>
