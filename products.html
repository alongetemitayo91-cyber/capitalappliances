<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Capital Appliances</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>

  <body class="font-sans bg-gray-50">
    <!-- NAV -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
          <h1 class="text-3xl font-semibold">
            Capital <span class="text-sky-600">Appliances</span>
          </h1>

          <button onclick="openMenu()" class="md:hidden text-3xl">☰</button>
        </div>
      </div>
    </nav>

    <!-- SIDEBAR -->
    <div
      id="sidebar"
      class="fixed top-0 left-0 h-full w-64 bg-white/90 backdrop-blur-md shadow-lg transform -translate-x-full transition-transform duration-300 z-[60]"
    >
      <div class="p-6 flex justify-between items-center border-b">
        <a href="index.html" onclick="closeMenu()" class="text-xl font-semibold"
          >Home</a
        >
        <button onclick="closeMenu()" class="text-2xl">✕</button>
      </div>

      <div class="p-6 space-y-4">
        <a
          href="index.html"
          onclick="closeMenu()"
          class="block text-lg font-medium"
          >Home</a
        >
        <a
          href="products.html"
          onclick="closeMenu()"
          class="block text-lg font-medium"
          >Products</a
        >
      </div>
    </div>

    <div
      id="overlay"
      onclick="closeMenu()"
      class="fixed inset-0 bg-black/30 backdrop-blur-sm hidden z-[50]"
    ></div>

    <!-- SEARCH -->
    <div class="sticky top-20 z-30 bg-gray-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="max-w-xl mx-auto relative">
          <!-- ✅ ENTER KEY ADDED -->
          <input
            id="searchInput"
            type="text"
            placeholder="Search products..."
            class="w-full p-4 rounded-2xl border shadow-sm outline-none"
            oninput="handleSearch(this.value)"
            onkeydown="
              if (event.key === 'Enter') {
                handleSearch(this.value);
                document.getElementById('suggestions').classList.add('hidden');
              }
            "
          />

          <div
            id="suggestions"
            class="absolute w-full bg-white shadow-lg rounded-2xl mt-2 hidden max-h-64 overflow-y-auto z-50"
          ></div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="max-w-7xl mx-auto px-6 py-16">
      <!-- FILTERS (unchanged except already correct) -->
      <div class="flex flex-wrap justify-center gap-3 mb-10">
        <button
          onclick="filterCategory('All')"
          data-category="All"
          class="filter-btn px-5 py-2 rounded-2xl bg-gray-200"
        >
          All
        </button>
        <button
          onclick="filterCategory('Kitchen')"
          data-category="Kitchen"
          class="filter-btn px-5 py-2 rounded-2xl bg-gray-200"
        >
          Kitchen
        </button>
        <button
          onclick="filterCategory('Home')"
          data-category="Home"
          class="filter-btn px-5 py-2 rounded-2xl bg-gray-200"
        >
          Home
        </button>
        <button
          onclick="filterCategory('Commercial')"
          data-category="Commercial"
          class="filter-btn px-5 py-2 rounded-2xl bg-gray-200"
        >
          Commercial
        </button>
      </div>

      <div
        id="products-grid"
        class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8"
      ></div>
    </div>

    <script>
      const products = [
        {
          name: "Premium Kitchen Extractor",
          category: "Kitchen",
          price: "₦450,000",
          img: "images/extractor.jpg",
        },
        {
          name: "Built-in Electric Oven",
          category: "Kitchen",
          price: "₦680,000",
          img: "images/oven.jpg",
        },
      ];

      let filteredProducts = [...products];
      let lastSearch = "";
      let activeCategory = "All";

      function renderProducts(list) {
        const grid = document.getElementById("products-grid");
        grid.innerHTML = "";

        list.forEach((p) => {
          grid.innerHTML += `
            <!-- ✅ ANIMATION + IMAGE FIX -->
            <div class="bg-white rounded-3xl overflow-hidden shadow transition transform hover:scale-105 active:scale-95">

              <img src="${p.img}" class="w-full h-64 object-cover bg-gray-100"
                onerror="this.src='https://via.placeholder.com/600x400'">

              <div class="p-6">
                <h3 class="text-xl font-semibold">${p.name}</h3>
                <p class="text-2xl font-bold">${p.price}</p>

                <button onclick="enquire('${p.name}','${p.price}')"
                  class="mt-4 w-full py-3 bg-emerald-500 text-white rounded-2xl">
                  Buy
                </button>
              </div>
            </div>
          `;
        });
      }

      function filterCategory(category) {
        activeCategory = category;
        updateActiveButton();
        applyFilters();
      }

      function handleSearch(query) {
        lastSearch = query;
        applyFilters(query);
      }

      function applyFilters(searchValue = lastSearch) {
        let result = products;

        if (activeCategory !== "All") {
          result = result.filter((p) => p.category === activeCategory);
        }

        const q = searchValue.toLowerCase();

        if (q) {
          result = result.filter((p) => p.name.toLowerCase().includes(q));
        }

        filteredProducts = result;
        renderProducts(result);
      }

      function enquire(name, price) {
        const phone = "2348091145666";

        // ✅ BETTER MESSAGE
        const text = encodeURIComponent(
          `Hello, I saw this on your website:

Product: ${name}
Price: ${price}

Is it available?`,
        );

        window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
      }

      function openMenu() {
        document
          .getElementById("sidebar")
          .classList.remove("-translate-x-full");
        document.getElementById("overlay").classList.remove("hidden");
      }

      function closeMenu() {
        document.getElementById("sidebar").classList.add("-translate-x-full");
        document.getElementById("overlay").classList.add("hidden");
      }

      function updateActiveButton() {
        const buttons = document.querySelectorAll(".filter-btn");

        buttons.forEach((btn) => {
          if (btn.dataset.category === activeCategory) {
            btn.classList.add("bg-sky-600", "text-white");
            btn.classList.remove("bg-gray-200");
          } else {
            btn.classList.remove("bg-sky-600", "text-white");
            btn.classList.add("bg-gray-200");
          }
        });
      }

      renderProducts(products);

      // ✅ IMPORTANT
      updateActiveButton();
    </script>
  </body>
</html>
