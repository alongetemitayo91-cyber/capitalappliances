<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Capital Appliances</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap");
    </style>
  </head>

  <body class="bg-gray-50 font-sans">
    <!-- NAV -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
          <h1 class="text-2xl font-bold">Capital Appliances</h1>

          <button
            onclick="openWhatsApp()"
            class="bg-emerald-500 text-white px-5 py-2 rounded-2xl"
          >
            Contact
          </button>
        </div>
      </div>
    </nav>

    <!-- PAGE -->
    <div class="max-w-7xl mx-auto px-4 py-10">
      <!-- TITLE -->
      <h1 class="text-3xl md:text-5xl font-semibold text-center">
        Our Premium Products
      </h1>

      <p class="text-center text-gray-600 mt-2 mb-8">
        Search and find exactly what you need
      </p>

      <!-- SEARCH BAR -->
      <div class="max-w-xl mx-auto mb-10">
        <div
          class="flex items-center bg-white shadow rounded-2xl overflow-hidden"
        >
          <i class="fa fa-search text-gray-400 px-4"></i>
          <input
            id="searchInput"
            type="text"
            placeholder="Search products (e.g cooker, oven, extractor...)"
            class="w-full py-4 outline-none"
            oninput="handleSearch(this.value)"
          />
        </div>
      </div>

      <!-- PRODUCTS GRID -->
      <div
        id="products-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>

      <!-- NO RESULT STATE -->
      <div id="noResults" class="hidden text-center mt-10">
        <p class="text-gray-600 mb-4">No product found for that search.</p>

        <button
          onclick="openWhatsApp()"
          class="bg-sky-600 text-white px-6 py-3 rounded-2xl"
        >
          Ask on WhatsApp
        </button>
      </div>
    </div>

    <!-- FLOAT -->
    <button
      onclick="openWhatsApp()"
      class="fixed bottom-6 right-6 bg-green-500 text-white w-14 h-14 rounded-full text-2xl"
    >
      <i class="fa-brands fa-whatsapp"></i>
    </button>

    <script>
      const products = [
        {
          name: "Premium Kitchen Extractor",
          category: "Kitchen",
          price: "₦450,000",
          img: "images/extractor.jpg",
        },
        {
          name: "Built-in Electric Oven",
          category: "Kitchen",
          price: "₦680,000",
          img: "images/oven.jpg",
        },
        {
          name: "Heavy Duty Gas Cooker",
          category: "Commercial",
          price: "₦520,000",
          img: "images/cooker.jpg",
        },
        {
          name: "Microwave Oven",
          category: "Home",
          price: "₦320,000",
          img: "images/microwave.jpg",
        },
        {
          name: "Wall Mounted Extractor",
          category: "Kitchen",
          price: "₦480,000",
          img: "images/extractor2.jpg",
        },
        {
          name: "Industrial Gas Cooker",
          category: "Commercial",
          price: "₦750,000",
          img: "images/cooker3.jpg",
        },
      ];

      let filtered = [...products];

      function renderProducts(list) {
        const grid = document.getElementById("products-grid");
        const noResults = document.getElementById("noResults");

        grid.innerHTML = "";

        if (list.length === 0) {
          noResults.classList.remove("hidden");
          return;
        }

        noResults.classList.add("hidden");

        list.forEach((p) => {
          grid.innerHTML += `
            <div class="bg-white rounded-3xl shadow overflow-hidden flex flex-col">

              <div class="aspect-square">
                <img src="${p.img}" class="w-full h-full object-cover" />
              </div>

              <div class="p-4 flex flex-col flex-1">
                <p class="text-xs text-sky-600 uppercase">${p.category}</p>

                <h3 class="font-semibold mt-1">${p.name}</h3>

                <p class="text-xl font-bold mt-2">${p.price}</p>

                <button
                  onclick="enquire('${p.name}', '${p.price}')"
                  class="mt-auto bg-emerald-500 text-white py-3 rounded-2xl"
                >
                  Buy on WhatsApp
                </button>
              </div>
            </div>
          `;
        });
      }

      function handleSearch(value) {
        const q = value.toLowerCase().trim();

        filtered = products.filter(
          (p) =>
            p.name.toLowerCase().includes(q) ||
            p.category.toLowerCase().includes(q),
        );

        renderProducts(filtered);
      }

      function enquire(name, price) {
        const phone = "2348091145666";
        const text = encodeURIComponent(`Hi, I want ${name} - ${price}`);
        window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
      }

      function openWhatsApp() {
        const phone = "2348091145666";
        window.open(`https://wa.me/${phone}`, "_blank");
      }

      renderProducts(products);
    </script>
  </body>
</html>
