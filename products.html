<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Capital Appliances</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap");
    </style>
  </head>

  <body class="font-sans bg-gray-50">
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
          <h1 class="text-3xl font-semibold">
            Capital <span class="text-sky-600">Appliances</span>
          </h1>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-16">
      <h1 class="text-5xl font-semibold text-center mb-2">
        Our Premium Products
      </h1>

      <p class="text-center text-gray-600 mb-6">
        Search and find what you need
      </p>

      <!-- SEARCH -->
      <div class="max-w-xl mx-auto mb-10 relative">
        <input
          id="searchInput"
          type="text"
          placeholder="Search products..."
          class="w-full p-4 rounded-2xl border shadow-sm outline-none"
          oninput="handleSearch(this.value)"
        />

        <!-- SUGGESTIONS DROPDOWN -->
        <div
          id="suggestions"
          class="absolute w-full bg-white shadow-lg rounded-2xl mt-2 hidden max-h-64 overflow-y-auto z-50"
        ></div>
      </div>

      <!-- PRODUCTS -->
      <div
        id="products-grid"
        class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8"
      ></div>

      <!-- NO RESULTS -->
      <div id="noResults" class="hidden text-center mt-10">
        <p class="text-gray-600 mb-4">No product found.</p>

        <button
          onclick="openWhatsApp()"
          class="bg-emerald-500 text-white px-6 py-3 rounded-2xl"
        >
          Ask on WhatsApp
        </button>
      </div>
    </div>

    <script>
      const products = [
        {
          name: "Premium Kitchen Extractor",
          category: "Kitchen",
          price: "₦450,000",
        },
        {
          name: "Built-in Electric Oven",
          category: "Kitchen",
          price: "₦680,000",
        },
        {
          name: "Heavy Duty Gas Cooker",
          category: "Commercial",
          price: "₦520,000",
        },
        { name: "Microwave Oven", category: "Home", price: "₦320,000" },
        {
          name: "Wall Mounted Extractor",
          category: "Kitchen",
          price: "₦480,000",
        },
        {
          name: "Industrial Gas Cooker",
          category: "Commercial",
          price: "₦750,000",
        },
      ];

      let filteredProducts = [...products];
      let lastSearch = "";

      function renderProducts(list) {
        const grid = document.getElementById("products-grid");
        const noResults = document.getElementById("noResults");

        grid.innerHTML = "";

        if (list.length === 0) {
          noResults.classList.remove("hidden");
          return;
        }

        noResults.classList.add("hidden");

        list.forEach((p) => {
          grid.innerHTML += `
            <div class="bg-white rounded-3xl shadow overflow-hidden">

              <div class="aspect-square bg-gray-100"></div>

              <div class="p-5">
                <p class="text-xs text-sky-600">${p.category}</p>
                <h3 class="font-semibold mt-1">${p.name}</h3>
                <p class="text-xl font-bold mt-2">${p.price}</p>

                <button
                  onclick="enquire('${p.name}', '${p.price}')"
                  class="mt-4 w-full bg-emerald-500 text-white py-3 rounded-2xl"
                >
                  Buy on WhatsApp
                </button>
              </div>
            </div>
          `;
        });
      }

      // 🔥 SEARCH + SUGGESTIONS
      function handleSearch(query) {
        lastSearch = query;
        const q = query.toLowerCase().trim();

        const suggestionsBox = document.getElementById("suggestions");

        if (!q) {
          suggestionsBox.classList.add("hidden");
          renderProducts(products);
          return;
        }

        const matches = products.filter(
          (p) =>
            p.name.toLowerCase().includes(q) ||
            p.category.toLowerCase().includes(q),
        );

        filteredProducts = matches;
        renderProducts(matches);

        // suggestions UI
        if (matches.length > 0) {
          suggestionsBox.innerHTML = matches
            .slice(0, 5)
            .map(
              (p) => `
              <div
                onclick="selectSuggestion('${p.name}')"
                class="p-3 hover:bg-gray-100 cursor-pointer border-b"
              >
                <p class="font-medium">${p.name}</p>
                <p class="text-xs text-gray-500">${p.category}</p>
              </div>
            `,
            )
            .join("");

          suggestionsBox.classList.remove("hidden");
        } else {
          suggestionsBox.innerHTML = `
            <div class="p-4 text-gray-600">
              No match found — you can ask on WhatsApp instead.
            </div>
          `;
          suggestionsBox.classList.remove("hidden");
        }
      }

      function selectSuggestion(name) {
        document.getElementById("searchInput").value = name;
        document.getElementById("suggestions").classList.add("hidden");
        handleSearch(name);
      }

      function enquire(name, price) {
        const phone = "2348091145666";
        const text = encodeURIComponent(
          `Hello, I'm interested in: ${name} - ${price}`,
        );
        window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
      }

      function openWhatsApp() {
        const phone = "2348091145666";

        let message = "";

        if (lastSearch && filteredProducts.length === 0) {
          message = `Please I’m looking for the availability of: ${lastSearch}`;
        } else {
          message = "Hello, I’d like to make an enquiry about your appliances.";
        }

        window.open(
          `https://wa.me/${phone}?text=${encodeURIComponent(message)}`,
          "_blank",
        );
      }

      renderProducts(products);
    </script>
  </body>
</html>
