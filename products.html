<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Capital Appliances</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap");
    </style>
  </head>
  <body class="font-sans bg-gray-50">
    <!-- NAVBAR (same as home) -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-20">
          <div class="flex items-center gap-x-3">
            <img
              src="/public/logo.png"
              alt="Logo"
              class="h-12 w-auto"
              onerror="
                this.src =
                  'https://via.placeholder.com/180x50/0ea5e9/ffffff?text=CAPITAL'
              "
            />
            <h1 class="text-3xl font-semibold tracking-tighter">
              capital <span class="text-sky-600">appliances</span>
            </h1>
          </div>
          <div class="hidden md:flex gap-x-10 text-lg">
            <a href="index.html" class="hover:text-sky-600">Home</a>
            <a href="products.html" class="text-sky-600 font-semibold"
              >Products</a
            >
            <button
              onclick="openWhatsApp()"
              class="flex items-center gap-x-2 px-6 py-3 bg-emerald-500 text-white rounded-3xl"
            >
              <i class="fa-brands fa-whatsapp"></i> Contact
            </button>
          </div>
          <button onclick="toggleMobileNav()" class="md:hidden text-3xl">
            ☰
          </button>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
      <h1 class="text-5xl font-semibold tracking-tighter text-center mb-4">
        Our Premium Products
      </h1>
      <p class="text-center text-gray-600 mb-12 text-xl">
        Home • Office • Commercial Appliances
      </p>

      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
        id="products-grid"
      >
        <!-- Products will be loaded by JavaScript -->
      </div>

      <div class="text-center mt-16">
        <button
          onclick="openWhatsApp()"
          class="px-12 py-6 bg-emerald-500 hover:bg-emerald-600 text-white text-2xl font-semibold rounded-3xl flex items-center gap-x-4 mx-auto"
        >
          <i class="fa-brands fa-whatsapp text-4xl"></i>
          Need something specific? Chat with us on WhatsApp
        </button>
      </div>
    </div>

    <!-- Floating WhatsApp -->
    <button
      onclick="openWhatsApp()"
      class="fixed bottom-8 right-8 w-16 h-16 bg-[#25D366] rounded-3xl shadow-2xl flex items-center justify-center text-white text-4xl z-50"
    >
      <i class="fa-brands fa-whatsapp"></i>
    </button>

    <script>
      const products = [
        {
          name: "Samsung 700L Smart Refrigerator",
          category: "Home",
          price: "₦1,850,000",
          img: "/public/samsung-fridge-700l.jpg",
        },
        {
          name: "LG 10kg Inverter Washing Machine",
          category: "Home",
          price: "₦785,000",
          img: "/public/lg-washing-machine-10kg.jpg",
        },
        {
          name: "Bosch Built-in Electric Oven",
          category: "Home",
          price: "₦920,000",
          img: "/public/bosch-oven.jpg",
        },
        {
          name: "Daikin 2HP Split Air Conditioner",
          category: "Office",
          price: "₦1,150,000",
          img: "/public/daikin-ac-2hp.jpg",
        },
        {
          name: "Hisense 16kg Top Load Washing Machine",
          category: "Home",
          price: "₦650,000",
          img: "/public/hisense-washing-machine.jpg",
        },
        {
          name: "Haier Thermocool 1500L Chest Freezer",
          category: "Commercial",
          price: "₦1,450,000",
          img: "/public/thermocool-freezer.jpg",
        },
        {
          name: "Industrial 3-Burner Gas Cooker",
          category: "Commercial",
          price: "₦680,000",
          img: "/public/gas-cooker.jpg",
        },
        {
          name: "Samsung Side-by-Side Refrigerator",
          category: "Home",
          price: "₦2,350,000",
          img: "/public/samsung-side-by-side.jpg",
        },
        // ← Add more products here following the same pattern
      ];

      function renderProducts() {
        const container = document.getElementById("products-grid");
        container.innerHTML = "";

        products.forEach((product) => {
          const card = `
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all">
                <img src="${product.img}" alt="${product.name}" 
                     class="w-full h-64 object-cover" 
                     onerror="this.src='https://via.placeholder.com/600x400?text=Product+Image'">
                <div class="p-6">
                    <span class="text-xs font-medium uppercase tracking-widest text-sky-600">${product.category}</span>
                    <h3 class="text-2xl font-semibold mt-2 leading-tight">${product.name}</h3>
                    <p class="text-3xl font-bold text-gray-900 mt-6">${product.price}</p>
                    
                    <button onclick="enquire('${product.name}')" 
                            class="mt-8 w-full py-5 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-2xl flex items-center justify-center gap-x-3 text-lg">
                        <i class="fa-brands fa-whatsapp text-2xl"></i>
                        Enquire on WhatsApp
                    </button>
                </div>
            </div>`;
          container.innerHTML += card;
        });
      }

      function enquire(productName) {
        const phone = "234XXXXXXXXXX"; // ← CHANGE TO YOUR REAL WHATSAPP NUMBER
        const message = encodeURIComponent(
          `Hello! I'm interested in this product: ${productName}. Please send me more details, current price, and availability.`,
        );
        window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
      }

      function openWhatsApp() {
        const phone = "234XXXXXXXXXX"; // ← CHANGE TO YOUR REAL WHATSAPP NUMBER
        window.open(`https://wa.me/${phone}`, "_blank");
      }

      function toggleMobileNav() {
        alert(
          "Mobile menu will be improved soon. Use the top navigation links for now.",
        );
      }

      // Load products when the page opens
      window.onload = renderProducts;
    </script>
  </body>
</html>
